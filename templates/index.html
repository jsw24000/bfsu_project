<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩具出口合规审查系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .preview-area {
            display: none;
            margin: 20px 0;
            text-align: center;
        }

        .preview-area img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .result-area {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            background: #f8f9fa;
        }

        .result-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .result-section {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .result-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .result-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .status-pass {
            color: #28a745;
            font-weight: bold;
        }

        .status-fail {
            color: #dc3545;
            font-weight: bold;
        }

        .status-warning {
            color: #ffc107;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #f5c6cb;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧸 玩具出口合规审查系统</h1>
        <p class="subtitle">基于百度图像识别API和沙特SASO规范</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">点击或拖拽图片到此处上传</div>
            <div class="upload-hint">支持 PNG、JPG、JPEG、GIF、BMP 格式</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="preview-area" id="previewArea">
            <img id="previewImage" src="" alt="预览图片">
        </div>

        <button class="button" id="checkButton" disabled>开始审查</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #667eea;">正在分析中，请稍候...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-area" id="resultArea">
            <div class="result-title">📋 审查结果</div>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const previewImage = document.getElementById('previewImage');
        const checkButton = document.getElementById('checkButton');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const resultArea = document.getElementById('resultArea');
        const resultContent = document.getElementById('resultContent');

        let selectedFile = null;

        // 点击上传区域触发文件选择
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择处理
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        // 处理文件
        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                showError('请选择有效的图片文件');
                return;
            }

            selectedFile = file;
            
            // 显示预览
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewArea.style.display = 'block';
                checkButton.disabled = false;
                resultArea.style.display = 'none';
                errorMessage.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // 开始审查
        checkButton.addEventListener('click', async () => {
            if (!selectedFile) return;

            // 显示加载状态
            loading.style.display = 'block';
            checkButton.disabled = true;
            resultArea.style.display = 'none';
            errorMessage.style.display = 'none';

            // 准备表单数据
            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                loading.style.display = 'none';
                checkButton.disabled = false;

                if (result.success) {
                    displayResult(result);
                } else {
                    showError(result.error || '审查失败，请重试');
                }
            } catch (error) {
                loading.style.display = 'none';
                checkButton.disabled = false;
                showError('网络错误: ' + error.message);
            }
        });

        // 显示结果
        function displayResult(result) {
            let html = '';

            // 总体判断
            const overallStatus = result.can_export ? 
                '<span class="status-pass">✅ 可以出口</span>' : 
                '<span class="status-fail">❌ 不可出口</span>';
            
            html += `<div class="result-section">
                <h3>总体判断</h3>
                <div class="result-item">${overallStatus}</div>
            </div>`;

            // 检测对象
            if (result.detected_objects && result.detected_objects.length > 0) {
                html += `<div class="result-section">
                    <h3>检测到的对象</h3>`;
                result.detected_objects.forEach(obj => {
                    html += `<div class="result-item">
                        ${obj.name} - 置信度: ${(obj.confidence * 100).toFixed(1)}%
                    </div>`;
                });
                html += `</div>`;
            }

            // 违规项
            if (result.violations && result.violations.length > 0) {
                html += `<div class="result-section">
                    <h3>⚠️ 发现违规项</h3>`;
                result.violations.forEach(violation => {
                    html += `<div class="result-item">
                        <strong>${violation.rule}</strong><br>
                        原因: ${violation.reason}
                    </div>`;
                });
                html += `</div>`;
            }

            // 建议
            if (result.suggestions && result.suggestions.length > 0) {
                html += `<div class="result-section">
                    <h3>💡 改进建议</h3>`;
                result.suggestions.forEach(suggestion => {
                    html += `<div class="result-item">${suggestion}</div>`;
                });
                html += `</div>`;
            }

            // 详细信息
            if (result.detailed_checks) {
                html += `<div class="result-section">
                    <h3>详细检查项</h3>`;
                for (const [key, value] of Object.entries(result.detailed_checks)) {
                    const status = value ? '✅ 通过' : '❌ 未通过';
                    const statusClass = value ? 'status-pass' : 'status-fail';
                    html += `<div class="result-item">
                        <span class="${statusClass}">${status}</span> - ${formatCheckName(key)}
                    </div>`;
                }
                html += `</div>`;
            }

            resultContent.innerHTML = html;
            resultArea.style.display = 'block';
        }

        // 格式化检查项名称
        function formatCheckName(name) {
            const names = {
                'no_forbidden_animals': '无禁忌动物',
                'no_female_representation': '无女性形象',
                'color_compliance': '颜色合规',
                'no_religious_symbols': '无宗教符号'
            };
            return names[name] || name;
        }

        // 显示错误
        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
